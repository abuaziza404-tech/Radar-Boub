name: Build BOUH Terrain Radar APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip Android project
        run: |
          unzip -o BOUH_TERRAIN_RADAR_ANDROID_V12_BUILDER.zip
          ls -la
          ls -la BOUH_TERRAIN_RADAR_ANDROID_V12_BUILDER

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build APK
        run: |
          cd BOUH_TERRAIN_RADAR_ANDROID_V12_BUILDER
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BOUH-Terrain-Radar-V12-debug-apk
          path: BOUH_TERRAIN_RADAR_ANDROID_V12_BUILDER/app/build/outputs/apk/debug/app-debug.apk
