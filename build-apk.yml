name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Rename APK files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/BouhTerrain-AboAziza-Pro-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/BouhTerrain-AboAziza-Pro-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BouhTerrain-AboAziza-Pro-APK
          path: dist/*.apk

      - name: Upload release asset when tag is pushed
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BouhTerrain-AboAziza-Pro-release.apk
